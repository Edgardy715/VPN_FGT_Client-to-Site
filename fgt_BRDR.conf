config system global
  set hostname "FGT-BRDR"
end

config system interface
  edit port1
    set alias "Conexion con R-core"
    set mode static
    set ip 10.0.0.2 255.255.255.252
    set allowaccess ping
  next
  edit port2
    set alias "Conexion a Internet"
    set mode static
    set ip 192.0.2.2 255.255.255.0
    set allowaccess ping https ssh
  next
end

config router static
  edit 1
    set gateway 10.0.0.1
    set device port1
  next
  edit 2
    set dst 10.1.1.0 255.255.255.0
    set gateway 10.0.0.1
    set device port1
  next
end
